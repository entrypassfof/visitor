<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سنبلة - تصريح الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Tajawal', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  transition: background .5s;
}
body.valid { background: linear-gradient(135deg, #0f2e1a, #1a4a2a); }
body.invalid { background: linear-gradient(135deg, #2e0f0f, #4a1a1a); }
body.unknown { background: linear-gradient(135deg, #1a1a2e, #2a2a4a); }

.card {
  width: 100%;
  max-width: 400px;
  border-radius: 24px;
  padding: 32px 28px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.valid .card { background: rgba(255,255,255,0.07); border: 2px solid rgba(82,196,144,0.5); }
.invalid .card { background: rgba(255,255,255,0.07); border: 2px solid rgba(224,107,125,0.5); }
.unknown .card { background: rgba(255,255,255,0.07); border: 2px solid rgba(255,255,255,0.1); }

.logo {
  width: 60px; height: 60px;
  background: linear-gradient(135deg, #C9A84C, #7A6020);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  margin: 0 auto 16px;
  box-shadow: 0 8px 24px rgba(201,168,76,0.3);
}
.org-name { font-size: 13px; color: #C9A84C; font-weight: 700; letter-spacing: 2px; margin-bottom: 24px; }

.status-icon { font-size: 56px; margin-bottom: 12px; }
.status-text {
  font-size: 22px; font-weight: 900;
  margin-bottom: 24px;
}
.valid .status-text { color: #52C490; }
.invalid .status-text { color: #E06B7D; }
.unknown .status-text { color: #aaa; }

.divider { height: 1px; background: rgba(255,255,255,0.1); margin: 20px 0; }

.info-row {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.info-row:last-child { border-bottom: none; }
.info-label { font-size: 12px; color: rgba(255,255,255,0.4); font-weight: 700; letter-spacing: 1px; }
.info-value { font-size: 15px; color: #fff; font-weight: 700; text-align: left; }

.footer { margin-top: 24px; font-size: 11px; color: rgba(255,255,255,0.2); }

.no-data {
  color: rgba(255,255,255,0.5);
  font-size: 16px;
  padding: 20px;
}
</style>
</head>
<body class="unknown">
<div class="card">
  <div class="logo">🌾</div>
  <div class="org-name">SUNBULA — سنبلة</div>

  <div id="content">
    <div class="no-data">جاري التحميل...</div>
  </div>

  <div class="footer">نظام إدارة الزوار — سنبلة</div>
</div>

<script>
function getParams() {
  const params = new URLSearchParams(window.location.search);
  return {
    name: params.get('name') || '',
    parking: params.get('parking') || '',
    date: params.get('date') || '',
    time: params.get('time') || ''
  };
}

function isToday(dateStr) {
  if (!dateStr) return false;
  const today = new Date();
  const todayStr = today.toISOString().split('T')[0];
  // Support multiple date formats
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) {
    // Try DD-MM-YYYY
    const parts = dateStr.split(/[-\/]/);
    if (parts.length === 3) {
      const reconstructed = `${parts[2]}-${parts[1]}-${parts[0]}`;
      return reconstructed === todayStr;
    }
    return false;
  }
  return d.toISOString().split('T')[0] === todayStr;
}

function render() {
  const p = getParams();

  if (!p.name && !p.date) {
    document.getElementById('content').innerHTML = '<div class="no-data">❌ لا توجد بيانات</div>';
    return;
  }

  const valid = isToday(p.date);
  document.body.className = valid ? 'valid' : 'invalid';

  document.getElementById('content').innerHTML = `
    <div class="status-icon">${valid ? '✅' : '❌'}</div>
    <div class="status-text">${valid ? 'زيارة اليوم — مصرّح' : 'ليس اليوم — غير مصرّح'}</div>
    <div class="divider"></div>
    ${p.name ? `<div class="info-row"><span class="info-label">الزائر</span><span class="info-value">${p.name}</span></div>` : ''}
    ${p.date ? `<div class="info-row"><span class="info-label">التاريخ</span><span class="info-value">${p.date}</span></div>` : ''}
    ${p.time ? `<div class="info-row"><span class="info-label">الوقت</span><span class="info-value">${p.time}</span></div>` : ''}
    ${p.parking ? `<div class="info-row"><span class="info-label">الموقف</span><span class="info-value">${p.parking}</span></div>` : ''}
  `;
}

render();
</script>
</body>
</html>
