<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entry Permit — تصريح دخول</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; transition:background-color .4s; }
body.authorized { background:#0d2318; }
body.expired    { background:#2a0d0d; }
body.notyet     { background:#1a1a1a; }
body.nodata     { background:#111; }
.card { width:100%; max-width:380px; border-radius:16px; overflow:hidden; box-shadow:0 24px 60px rgba(0,0,0,0.6); }
.header { background:#0a0a0a; padding:16px 24px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #1e1e1e; }
.header-en { font-size:11px; font-weight:700; letter-spacing:3px; color:#555; text-transform:uppercase; }
.header-ar { font-size:11px; font-weight:700; color:#555; direction:rtl; }
.status-bar { padding:24px; text-align:center; }
.authorized .status-bar { background:#163d28; }
.expired    .status-bar { background:#3d1616; }
.notyet     .status-bar { background:#2a2a2a; }
.nodata     .status-bar { background:#1a1a1a; }
.status-en { font-size:22px; font-weight:900; letter-spacing:2px; text-transform:uppercase; margin-bottom:4px; }
.status-ar { font-size:14px; font-weight:700; direction:rtl; margin-bottom:12px; }
.authorized .status-en, .authorized .status-ar { color:#5dffaa; }
.expired    .status-en, .expired    .status-ar { color:#ff6b6b; }
.notyet     .status-en, .notyet     .status-ar { color:#aaa; }
.nodata     .status-en, .nodata     .status-ar { color:#555; }
.validity-time { font-family:'IBM Plex Mono',monospace; font-size:10px; color:#444; letter-spacing:2px; }
.authorized .validity-time { color:#2d7a50; }
.expired    .validity-time { color:#7a2d2d; }
.info-block { background:#0f0f0f; padding:20px 24px; }
.org-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; padding-bottom:14px; border-bottom:1px solid #1a1a1a; }
.org-en { font-size:10px; font-weight:700; letter-spacing:3px; color:#444; text-transform:uppercase; }
.org-val { font-size:12px; font-weight:700; color:#666; letter-spacing:1px; }
.row { display:flex; justify-content:space-between; align-items:flex-start; padding:10px 0; border-bottom:1px solid #161616; }
.row:last-child { border-bottom:none; }
.row-labels { display:flex; flex-direction:column; gap:2px; }
.row-en { font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#3a3a3a; }
.row-ar { font-size:10px; font-weight:600; color:#3a3a3a; direction:rtl; }
.row-value { font-family:'IBM Plex Mono',monospace; font-size:13px; font-weight:600; color:#ccc; text-align:right; max-width:55%; word-break:break-word; }
</style>
</head>
<body class="nodata">
<div class="card">
  <div class="header">
    <span class="header-en">Entry Permit</span>
    <span class="header-ar">تصريح دخول</span>
  </div>
  <div class="status-bar">
    <div class="status-en" id="statusEn">—</div>
    <div class="status-ar" id="statusAr">—</div>
    <div class="validity-time">VALID 07:00 – 20:00</div>
  </div>
  <div class="info-block" id="infoBlock"></div>
</div>
<script>
function getParams(){const p=new URLSearchParams(window.location.search);return{name:p.get('name')||'',parking:p.get('parking')||'',date:p.get('date')||'',time:p.get('time')||'',car:p.get('car')||'',plate:p.get('plate')||'',platnum:p.get('platnum')||'',org:p.get('org')||''};}
function getStatus(dateStr){if(!dateStr)return'nodata';const now=new Date();const todayStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;const hour=now.getHours();let visitStr='';if(dateStr.includes('/')){const parts=dateStr.split('/');if(parts.length===3){visitStr=`${parts[2]}-${String(parts[0]).padStart(2,'0')}-${String(parts[1]).padStart(2,'0')}`;}}else{visitStr=dateStr.split('T')[0].trim();}if(visitStr===todayStr){if(hour<7)return'notyet';if(hour<20)return'authorized';return'expired';}return new Date(visitStr)>new Date(todayStr)?'notyet':'expired';}
function row(en,ar,value){if(!value)return'';return`<div class="row"><div class="row-labels"><span class="row-en">${en}</span><span class="row-ar">${ar}</span></div><div class="row-value">${value}</div></div>`;}
function render(){const p=getParams();const status=getStatus(p.date);document.body.className=status;const now=new Date();const todayStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;let visitStr=p.date;if(p.date.includes('/')){const parts=p.date.split('/');if(parts.length===3)visitStr=`${parts[2]}-${String(parts[0]).padStart(2,'0')}-${String(parts[1]).padStart(2,'0')}`;}const isFuture=p.date&&new Date(visitStr)>new Date(todayStr);const labels={authorized:{en:'AUTHORIZED',ar:'مصرّح'},expired:{en:'EXPIRED',ar:'منتهي'},notyet:{en:isFuture?'NOT TODAY':'NOT YET',ar:isFuture?'ليس اليوم':'لم يبدأ'},nodata:{en:'NO DATA',ar:'لا توجد بيانات'}};document.getElementById('statusEn').textContent=labels[status].en;document.getElementById('statusAr').textContent=labels[status].ar;if(!p.name&&!p.date){document.getElementById('infoBlock').innerHTML='';return;}document.getElementById('infoBlock').innerHTML=`${p.org?`<div class="org-row"><span class="org-en">Organization</span><span class="org-val">${p.org}</span></div>`:''}${row('Visitor Name','اسم الزائر',p.name)}${row('Date','التاريخ',p.date)}${row('Time','الوقت',p.time)}${row('Parking','الموقف',p.parking)}${row('Vehicle','المركبة',p.car)}${row('Plate Letters','حروف اللوحة',p.plate)}${row('Plate Number','أرقام اللوحة',p.platnum)}`;}
render();
</script>
</body>
</html>
